<!DOCTYPE html>
<html>
  <head>
    <title>
      Rock paper scissor
    </title>
    <link rel="stylesheet" href="rock-paper.css">
  </head>
  <body>

    <div class="align">
      <p class="heading">
      Rock paper scissor
    </p>

    <button onclick="
      playgame('stone')
    "
    class="move-button">
      <img src="rock-emoji.png"    class="move_img">
    </button>

     <button
     onclick="
        playgame('paper')
        "  class="move-button">
      <img src="paper-emoji.png" class="move_img">
    </button>

     <button onclick="

        playgame('scissor')
        "  class="move-button">
      <img src="scissors-emoji.png"  class="move_img">
    </button>
    <p class="js-move result"></p>
    <p class="js-score score"></p>
    <button onclick="score.wins=0;score.losses=0;score.tie=0; updateScore()" class="reset-button">Reset</button>

    </div>
    

    <script src="rock-paper.js"></script> 

    
  </body>
</html>
